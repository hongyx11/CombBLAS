name: Release Tests

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: self-hosted
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      - name: Print checked code and check environments
        run: |
          ls -lah
          echo $(pwd)
          echo $(which cmake)
      - name: Run Cmake Configuration
        run: cmake -S . -B build 
      - name: Build MultTiming 
        run: cmake --build build --target MultTiming -j
      - name: Upload MultTiming binary
        uses: actions/upload-artifact@v3
        with:
          name: MultTiming-binary
          path: build/ReleaseTests/MultTiming
        
  benchmark:
      needs: build   # waits for build to finish
      runs-on: self-hosted
      steps:
        - name: Checkout code
          uses: actions/checkout@v3
        - name: Download MultTiming binary
          uses: actions/download-artifact@v3
          with:
            name: MultTiming-binary
            path: build/ReleaseTests
        - name: Run MultTiming benchmark
          env:
            OMP_NUM_THREADS: 16
          run: |
            srun -t 00:30:00 -N 1 -n 4 -c 32 --cpu-bind=cores \
            -q interactive -C gpu --gpus 4 --account=m4293_g \
            ./build/ReleaseTests/MultTiming $DLOC/bcsstk32/bcsstk32.mtx $DLOC/bcsstk32/bcsstk32.mtx
            
